name: setup-cached-python-client
description:
  Create a Python environment with cached dependencies for the client.

inputs:
  version:
    description: Which Python version to install
    required: true
    default: "3.10"
  working-directory:
    description: The working directory
    required: true
  no-build-isolation:
    description:
      Use --no-build-isolation (needed for macOS ARM grpcio-tools builds)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.version }}

    - name: Setup uv with caching
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6
      with:
        enable-cache: true
        version: "0.11.7"
        activate-environment: "true"
        python-version: ${{ inputs.version }}
        cache-dependency-glob: |
          ${{ inputs.working-directory }}/requirements.protos.txt
          ${{ inputs.working-directory }}/pyproject.toml

    - name: Install Python packages
      shell: bash
      run: |
        if [ "${{ inputs.no-build-isolation }}" == "true" ]; then
          # Install setuptools and build requirements first so that --no-build-isolation works
          uv pip install -e . --group dev
          uv pip install -r requirements.protos.txt --no-build-isolation
        else
          uv pip install -e . --group dev --overrides requirements.protos.txt
        fi
      working-directory: ${{ inputs.working-directory }}
