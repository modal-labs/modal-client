name: Go & JS Client tests

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      MODAL_TOKEN_ID:
        required: true
      MODAL_TOKEN_SECRET:
        required: true

env:
  UV_FROZEN: 1
  TERM: linux
  TERMINFO: /etc/terminfo
  PYTHONIOENCODING: utf-8

jobs:
  test-support:
    name: Lint and set up test-support
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-cached-python-client
        with:
          version: "3.11"
          working-directory: ${{ inputs.working-directory }}/py

      - name: Build protobuf
        run: inv protoc
        working-directory: ${{ inputs.working-directory }}/py

      - name: Build type stubs
        run: inv type-stubs
        working-directory: ${{ inputs.working-directory }}/py

      - run: |
          ruff check test-support/
          ruff format --check test-support/
        working-directory: ${{ inputs.working-directory }}

      # TODO: Enable when the `arn:aws:iam` gets updated
      # - uses: aws-actions/configure-aws-credentials@be2e7ad815e27b890489a89ce2717b0f9e26b56e # v4
      #   if: github.event.pull_request.head.repo.fork == false
      #   with:
      #     role-to-assume: arn:aws:iam::459781239556:role/libmodal-ci-cd-role-62a288d
      #     aws-region: us-east-1

      # - run: |
      #     test-support/setup.sh
      #   working-directory: ${{ inputs.working-directory }}
      #   env:
      #     MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      #     MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      #     MODAL_ENVIRONMENT: libmodal
      #     MODAL_SYNC_ENTRYPOINT: 1
      #   if: github.event.pull_request.head.repo.fork == false

  js:
    name: modal-js build, lint, and test
    runs-on: ubuntu-latest
    needs: test-support

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: "22"

      - run: npm ci
        working-directory: ${{ inputs.working-directory }}/js

      - run: npm run format:check
        working-directory: ${{ inputs.working-directory }}/js

      - run: npm run check
        working-directory: ${{ inputs.working-directory }}/js

      - run: npm run lint
        working-directory: ${{ inputs.working-directory }}/js

      - run: npm run build
        working-directory: ${{ inputs.working-directory }}/js

      - run: npm test
        working-directory: ${{ inputs.working-directory }}/js
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_ENVIRONMENT: libmodal
        if: github.event.pull_request.head.repo.fork == false

  go:
    name: modal-go build, lint, and test
    runs-on: ubuntu-latest
    needs: test-support

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: ${{ inputs.working-directory }}/go/go.mod
          cache-dependency-path: ${{ inputs.working-directory }}/go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.3
          working-directory: ${{ inputs.working-directory }}/go

      - run: go test -v -count=1 -parallel=10 ./...
        working-directory: ${{ inputs.working-directory }}/go
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          MODAL_ENVIRONMENT: libmodal
        if: github.event.pull_request.head.repo.fork == false
