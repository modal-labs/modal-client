syntax = "proto3";

option go_package = "github.com/modal-labs/modal/go/proto";

import "google/protobuf/empty.proto";
import "modal_proto/api.proto";

package modal.task_command_router;

enum SandboxStdioFileDescriptor {
  SANDBOX_STDIO_FILE_DESCRIPTOR_STDOUT = 0;
  SANDBOX_STDIO_FILE_DESCRIPTOR_STDERR = 1;
}

enum TaskExecStderrConfig {
  // The output will be discarded.
  TASK_EXEC_STDERR_CONFIG_DEVNULL = 0;
  // The output will be streamed to the client.
  TASK_EXEC_STDERR_CONFIG_PIPE = 1;
  // A special value that can be used to indicate that the stderr stream should
  // be merged with the stdout stream.
  TASK_EXEC_STDERR_CONFIG_STDOUT = 2;
}

enum TaskExecStdioFileDescriptor {
  // Read from stdout.
  TASK_EXEC_STDIO_FILE_DESCRIPTOR_STDOUT = 0;
  // Read from stderr.
  TASK_EXEC_STDIO_FILE_DESCRIPTOR_STDERR = 1;
}

enum TaskExecStdoutConfig {
  // The output will be discarded.
  TASK_EXEC_STDOUT_CONFIG_DEVNULL = 0;
  // The output will be streamed to the client.
  TASK_EXEC_STDOUT_CONFIG_PIPE = 1;
}

message SandboxStdinWriteV2Request {
  string task_id = 1;
  uint64 offset = 2;
  bytes data = 3;
  bool eof = 4;
}

message SandboxStdinWriteV2Response {}

message SandboxStdioReadV2Request {
  string task_id = 1;
  uint64 offset = 2;
  SandboxStdioFileDescriptor file_descriptor = 3;
}

message SandboxStdioReadV2Response {
  bytes data = 1;
  uint64 starting_offset = 2;
}

message SandboxWaitUntilReadyRequest {
  string task_id = 1;
  float timeout = 2;
}

message SandboxWaitUntilReadyResponse {
  double ready_at = 1;
}

message TaskContainerCreateRequest {
  string task_id = 1;
  // Logical container name.
  string container_name = 2;
  string image_id = 3;
  repeated string args = 5;
  map<string, string> env = 6;
  string workdir = 7;
  // Secret IDs to inject into the container as environment variables.
  repeated string secret_ids = 8;
  // Volumes to mount into the container.
  repeated modal.client.VolumeMount volume_mounts = 9;
}

message TaskContainerCreateResponse {
  // Fully qualified container ID (for example, ctr-<ulid>).
  string container_id = 1;
  // Logical container name associated with this container.
  string container_name = 2;
}

message TaskContainerGetRequest {
  string task_id = 1;
  string container_name = 2;
  // Include the latest terminated container if the name is no longer active.
  bool include_terminated = 3;
}

message TaskContainerGetResponse {
  TaskContainerInfo container = 1;
}

message TaskContainerInfo {
  string container_id = 1;
  string container_name = 2;
  string status = 3;
  modal.client.GenericResult result = 4;
}

message TaskContainerListRequest {
  string task_id = 1;
  // Include all tracked terminated containers in addition to active ones.
  bool include_terminated = 2;
}

message TaskContainerListResponse {
  repeated TaskContainerInfo containers = 1;
}

message TaskContainerTerminateRequest {
  string task_id = 1;
  string container_id = 2;
}

message TaskContainerTerminateResponse {}

message TaskContainerWaitRequest {
  string task_id = 1;
  string container_id = 2;
  float timeout = 3;
}

message TaskContainerWaitResponse {
  modal.client.GenericResult result = 1;
}

message TaskExecPollRequest {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to wait on.
  string exec_id = 2;
}

// The response to a TaskExecPollRequest. If the exec'd command has not
// completed, exit_status will be unset.
message TaskExecPollResponse {
  oneof exit_status {
    // The exit code of the command.
    int32 code = 1;
    // The signal that terminated the command.
    int32 signal = 2;
  }
  // TODO(saltzm): Give a way for the user to distinguish between normal exit
  // and termination by Modal (due to task timeout, exec exceeded deadline, etc.)
}

message TaskExecStartRequest {
  // The ID of the task to execute the command in.
  string task_id = 1;
  // Execution ID. This ID will be used to identify the execution for other
  // requests and ensure exec commands are idempotent.
  string exec_id = 2;
  // Command arguments to execute.
  repeated string command_args= 3;
  // Configures how the stdout of the command will be handled.
  TaskExecStdoutConfig stdout_config = 4;
  // Configures how the stderr of the command will be handled.
  TaskExecStderrConfig stderr_config = 5;
  // Timeout in seconds for the exec'd command to exit. If the command does not
  // exit within this duration, the command will be killed. This is NOT the
  // timeout for the ExecStartRequest RPC to complete.
  optional uint32 timeout_secs = 6;
  // Working directory for the command.
  optional string workdir = 7;
  // Secret IDs to mount into the task.
  repeated string secret_ids = 8;
  // PTY info for the command.
  optional modal.client.PTYInfo pty_info = 9;
  // Enable debugging capabilities on the container runtime. Used only for
  // internal debugging.
  bool runtime_debug = 10;
  // Fully qualified target container ID. Empty targets the main container.
  string container_id = 11;
  // Environment variables to set directly for the exec'd command.
  map<string, string> env = 12;
}

message TaskExecStartResponse { }

message TaskExecStdinStatusRequest {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to query.
  string exec_id = 2;
}

message TaskExecStdinStatusResponse {
  // Number of bytes the server has accepted for this exec so far.
  // A streaming client that lost its connection should resume sending at this
  // offset.
  uint64 num_bytes_written = 1;
  // True if stdin has already been closed (EOF sent) for this exec.
  bool closed = 2;
}

message TaskExecStdinWriteRequest {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to write to.
  string exec_id = 2;
  // The offset to start writing to. This is used to resume writing from the
  // last write position if the connection is closed and reopened.
  uint64 offset = 3;
  bytes data = 4;
  // If true, close the stdin stream after writing any provided data.
  // This signals EOF to the exec'd process.
  bool eof = 5;
}

message TaskExecStdinWriteResponse { }

message TaskExecStdinWriteStreamRequest {
  // First message must be `start`; subsequent messages must be `data`.
  oneof payload {
    // Start of a stdin write stream. Includes task_id, exec_id, and offset to write to.
    TaskExecStdinWriteStreamStart start = 1;
    // A chunk of stdin data to write to the exec'd command.
    bytes data = 2;
  }
}

message TaskExecStdinWriteStreamResponse { }

message TaskExecStdinWriteStreamStart {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to write to.
  string exec_id = 2;
  // The byte offset at which the stream begins. Will be 0 unless resuming a broken stream.
  uint64 offset = 3;
}

message TaskExecStdioReadRequest {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to read from.
  string exec_id = 2;
  // The offset to start reading from. This is used to resume reading from the
  // last read position if the connection is closed and reopened.
  uint64 offset = 3;
  // Which file descriptor to read from.
  TaskExecStdioFileDescriptor file_descriptor = 4;
}

message TaskExecStdioReadResponse {
  // The data read from the file descriptor.
  bytes data = 1;
}

message TaskExecWaitRequest {
  // The ID of the task running the exec'd command.
  string task_id = 1;
  // The execution ID of the command to wait on.
  string exec_id = 2;
}

message TaskExecWaitResponse {
  oneof exit_status {
    // The exit code of the command.
    int32 code = 1;
    // The signal that terminated the command.
    int32 signal = 2;
  }
  // TODO(saltzm): Give a way for the user to distinguish between normal exit
  // and termination by Modal (due to task timeout, exec exceeded deadline, etc.)
}

message TaskMountDirectoryRequest {
  string task_id = 1;
  bytes path = 2;
  string image_id = 3;
  // Customer-supplied encryption key used to decrypt CSEK-encrypted image metadata keys.
  // This key is not persisted by Modal.
  optional bytes customer_supplied_encryption_key = 4;
}

message TaskSnapshotDirectoryRequest {
  string task_id = 1;
  bytes path = 2;
  // A unique ID to ensure idempotency of directory snapshot requests.
  string snapshot_id = 3;
  // Lifetime for the resulting image, in seconds. When set, the
  // image's expires_at is a hard cutoff: it is fixed at creation time
  // and is not extended on use.
  //
  // When unset, the resulting image gets the legacy retention policy:
  // a 30-day TTL that is bumped forward by 30 days on every use, so
  // active images effectively never expire.
  //
  // Sentinel: -1 means "no expiry" (the image never expires).
  // 0 and other negative values are invalid and rejected by the
  // server.
  optional int64 ttl_seconds = 4;
  // Customer-supplied encryption key used to encrypt the resulting image's data and tree
  // metadata keys. This key is not persisted by Modal.
  optional bytes customer_supplied_encryption_key = 5;
}

message TaskSnapshotDirectoryResponse {
  string image_id = 1;
}

message TaskSnapshotFilesystemRequest {
  string task_id = 1;
  // A unique ID to ensure idempotency of filesystem snapshot requests.
  string snapshot_id = 2;
  // Lifetime for the resulting image, in seconds. Must be set. When positive,
  // the image expiry is a hard cutoff: it is fixed at creation time and is
  // not extended on use.
  //
  // Sentinel: -1 means "no expiry" (the image never expires).
  // 0 and other negative values are invalid and rejected by the
  // server.
  optional int64 ttl_seconds = 3;
  // Customer-supplied encryption key used to encrypt the resulting image's data and tree
  // metadata keys. This key is not persisted by Modal.
  optional bytes customer_supplied_encryption_key = 4;
}

message TaskSnapshotFilesystemResponse {
  string image_id = 1;
}

message TaskUnmountDirectoryRequest {
  string task_id = 1;
  bytes path = 2;
}

service TaskCommandRouter {
  rpc SandboxStdinWriteV2(SandboxStdinWriteV2Request) returns (SandboxStdinWriteV2Response);
  rpc SandboxStdioReadV2(SandboxStdioReadV2Request) returns (stream SandboxStdioReadV2Response);
  rpc SandboxWaitUntilReady(SandboxWaitUntilReadyRequest) returns (SandboxWaitUntilReadyResponse);
  // Create an additional container for a task.
  rpc TaskContainerCreate(TaskContainerCreateRequest) returns (TaskContainerCreateResponse);
  // Get the latest container associated with a logical name.
  rpc TaskContainerGet(TaskContainerGetRequest) returns (TaskContainerGetResponse);
  // List containers associated with the task.
  rpc TaskContainerList(TaskContainerListRequest) returns (TaskContainerListResponse);
  // Terminate or release a tracked container.
  rpc TaskContainerTerminate(TaskContainerTerminateRequest) returns (TaskContainerTerminateResponse);
  // Wait for a tracked container to reach a terminal result.
  rpc TaskContainerWait(TaskContainerWaitRequest) returns (TaskContainerWaitResponse);
  // Poll for the exit status of an exec'd command.
  rpc TaskExecPoll(TaskExecPollRequest) returns (TaskExecPollResponse);
  // Execute a command in the task.
  rpc TaskExecStart(TaskExecStartRequest) returns (TaskExecStartResponse);
  // Get the current stdin write status for an exec'd command. Used to resume
  // a TaskExecStdinWriteStream after a stream failure.
  rpc TaskExecStdinStatus(TaskExecStdinStatusRequest) returns (TaskExecStdinStatusResponse);
  // Write to the stdin stream of an exec'd command.
  rpc TaskExecStdinWrite(TaskExecStdinWriteRequest) returns (TaskExecStdinWriteResponse);
  // Stream stdin bytes to an exec'd command. First message carries the
  // start envelope (task_id, exec_id, offset); subsequent messages carry data.
  rpc TaskExecStdinWriteStream(stream TaskExecStdinWriteStreamRequest) returns (TaskExecStdinWriteStreamResponse);
  // Get a stream of output from the stdout or stderr stream of an exec'd command.
  rpc TaskExecStdioRead(TaskExecStdioReadRequest) returns (stream TaskExecStdioReadResponse);
  // Wait for an exec'd command to exit and return the exit code.
  rpc TaskExecWait(TaskExecWaitRequest) returns (TaskExecWaitResponse);
  // Mount an image at a directory in the container.
  rpc TaskMountDirectory(TaskMountDirectoryRequest) returns (google.protobuf.Empty);
  // Snapshot a directory with a mounted image, including any local changes, into a new image.
  rpc TaskSnapshotDirectory(TaskSnapshotDirectoryRequest) returns (TaskSnapshotDirectoryResponse);
  // Snapshot the full task filesystem into a new image.
  rpc TaskSnapshotFilesystem(TaskSnapshotFilesystemRequest) returns (TaskSnapshotFilesystemResponse);
  // Unmount an image previously mounted at a directory in the container.
  rpc TaskUnmountDirectory(TaskUnmountDirectoryRequest) returns (google.protobuf.Empty);
}
